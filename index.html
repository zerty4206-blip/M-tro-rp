<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MÉTRO - Grossiste RP</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding-bottom: 120px; }
        .hidden { display: none !important; }
        #welcome-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #1e3a8a 0%, #121212 100%); }
        .logo { width: 220px; border-radius: 15px; border: 3px solid #f1c40f; box-shadow: 0 0 20px rgba(241, 196, 15, 0.3); }
        .btn-enter { margin-top: 30px; padding: 15px 40px; font-size: 1.2rem; background: #f1c40f; color: #000; border: none; cursor: pointer; border-radius: 50px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; padding: 15px; }
        .card { background: #1e1e1e; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .price { color: #2ecc71; font-weight: bold; display: block; margin: 5px 0; }
        input[type="number"] { width: 50px; padding: 5px; border-radius: 5px; text-align: center; }
        #cart-summary { background: #1a1a1a; padding: 15px; position: fixed; bottom: 0; width: 100%; border-top: 4px solid #f1c40f; box-sizing: border-box; }
        .btn-order { background: #27ae60; color: white; padding: 10px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <img src="https://i.ibb.co/XfXfGZp/7677.jpg" class="logo">
        <h1>BIENVENUE AU MÉTRO</h1>
        <button class="btn-enter" onclick="showShop()">COMMANDER</button>
    </div>

    <div id="shop-screen" class="hidden">
        <h2 style="color:#f1c40f">Catalogue Métro</h2>
        <div class="grid" id="product-list"></div>
        <div id="cart-summary">
            <div>TOTAL : <span id="total-price" style="color:#2ecc71">0</span> €</div>
            <div style="font-size:0.9rem; color:#f1c40f">Com Vendeur (30%) : <span id="commission-price">0</span> €</div>
            <button class="btn-order" onclick="finalizeOrder()">FINALISER ET ENVOYER</button>
        </div>
    </div>

    <script>
        const webhookURL = "MET_TON_URL_WEBHOOK_ICI"; // <--- COLLER L'URL DU WEBHOOK ICI

        const products = [
            { name: "Pomme", price: 2 }, { name: "Poire", price: 3 },
            { name: "Frites", price: 10 }, { name: "Raisin", price: 5 },
            { name: "Sel", price: 3 }, { name: "Sucre", price: 4 },
            { name: "Steak", price: 5 }, { name: "Cookie", price: 2.5 },
            { name: "Nuggets", price: 8 }, { name: "Chips", price: 5 },
            { name: "Fromage", price: 4 }, { name: "Saucisson", price: 4 },
            { name: "Lait", price: 3 }, { name: "Soda", price: 10 },
            { name: "Pack soda", price: 190 }, { name: "Eau", price: 30 },
            { name: "Pack eau", price: 100 }, { name: "Pain", price: 7.5 }
        ];

        function showShop() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('shop-screen').classList.remove('hidden');
            const list = document.getElementById('product-list');
            products.forEach((p, i) => {
                list.innerHTML += `<div class="card"><h4>${p.name}</h4><span class="price">${p.price}€</span><input type="number" min="0" value="0" oninput="updateTotal()" id="qty-${i}"></div>`;
            });
        }

        function updateTotal() {
            let total = 0;
            products.forEach((p, i) => {
                total += p.price * (document.getElementById(`qty-${i}`).value || 0);
            });
            document.getElementById('total-price').innerText = total.toFixed(2);
            document.getElementById('commission-price').innerText = (total * 0.3).toFixed(2);
        }

        async function finalizeOrder() {
            const total = document.getElementById('total-price').innerText;
            const comm = document.getElementById('commission-price').innerText;
            if(total == "0.00") return alert("Panier vide");

            const message = {
                embeds: [{
                    title: "🛒 Nouvelle Commande MÉTRO",
                    color: 15844367,
                    fields: [
                        { name: "Total Client", value: total + " €", inline: true },
                        { name: "Com Vendeur (30%)", value: comm + " €", inline: true }
                    ],
                    footer: { text: "Métro RP - Système de commande automatique" }
                }]
            };

            await fetch(webhookURL, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(message) });
            
            alert("✅ Commande envoyée au Discord !");
            window.location.href = "https://discord.gg/7h5HV5N3";
        }
    </script>
</body>
</html>
